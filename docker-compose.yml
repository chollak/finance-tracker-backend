services:
  app:
    build: 
      context: .
      target: production
    ports:
      - "3000:3000"
    restart: unless-stopped
    environment:
      - NODE_ENV=production
    env_file:
      - .env
    # Use bind mounts with proper user mapping
    user: "1000:1000"
    volumes:
      # Persist data directories
      - ./downloads:/app/downloads
      - ./uploads:/app/uploads
      - ./data:/app/data

  # Database initialization service - run with: docker compose run db-init
  db-init:
    build: 
      context: .
      target: production
    env_file:
      - .env
    volumes:
      - ./data:/app/data
    command: ["node", "scripts/init-database.js"]
    profiles:
      - db-init

  # Database restore service - run with: docker compose run db-restore
  # Usage: docker compose run db-restore node scripts/restore-data.js /app/data/backup.json
  db-restore:
    build: 
      context: .
      target: production
    env_file:
      - .env
    volumes:
      - ./data:/app/data
    command: ["sh", "-c", "echo 'Usage: docker compose run db-restore node scripts/restore-data.js /app/data/backup.json'"]
    profiles:
      - db-restore
