name: Deploy to Production

on:
  push:
    branches: [main]

jobs:
  quality-gate:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 20
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Run full verification
      run: npm run verify

  deploy:
    needs: quality-gate
    runs-on: ubuntu-latest
    if: success()

    steps:
    - name: Deploy over SSH
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.SSH_HOST }}
        username: ${{ secrets.SSH_USER }}
        key: ${{ secrets.SSH_KEY }}
        port: 22
        timeout: 120s
        command_timeout: 20m
        script: |
          echo "🚀 Starting deployment..."

          # Navigate to project directory
          cd $HOME/finance-tracker-backend || {
            echo "❌ Project directory not found. Cloning repository..."
            git clone https://github.com/${{ github.repository }} $HOME/finance-tracker-backend
            cd $HOME/finance-tracker-backend
          }

          # Pull latest changes
          echo "📥 Pulling latest changes..."
          git pull origin main

          # Stop existing containers (with timeout and force)
          echo "🛑 Stopping existing containers..."
          docker compose down --timeout 30 || docker compose kill || true

          # Clean up any dangling containers
          docker container prune -f || true

          # Rebuild and start containers
          echo "🔨 Building and starting containers..."
          docker compose up -d --build --force-recreate

          # Wait for services to be ready
          echo "⏳ Waiting for services to start..."
          sleep 15

          # Check if containers are running
          echo "🔍 Checking container status..."
          docker compose ps

          # Show recent logs
          echo "📋 Recent logs:"
          docker compose logs --tail=20

          echo "✅ Deployment complete!"
